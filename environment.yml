name: MCITlib
channels:
  - pytorch
  - nvidia
  - defaults
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main/
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/free/
dependencies:
  - python=3.10
  - pip
  # 核心深度学习库: Torch 2.5.1 + CUDA 12.4
  - pytorch=2.5.1
  - pytorch-cuda=12.4
  - torchvision=0.20.1
  - torchaudio=2.5.1
  # 系统及数学库
  - blas=1.0=mkl
  - intel-openmp
  - mkl
  - mkl-service
  - mkl_fft
  - mkl_random
  - numpy=1.26.4
  - libgcc-ng
  - libstdcxx-ng
  - openssl
  - ca-certificates
  - certifi
  - pip:
      # 适配 Torch 2.5 的核心训练库
      - transformers==4.46.0
      - accelerate==1.0.1
      - peft==0.13.2
      - bitsandbytes==0.44.1
      - deepspeed==0.15.4
      - safetensors
      - tokenizers
      - sentencepiece
      - timm==1.0.11
      # 多模态与机器人相关 (LLava/VLA)
      - llava
      - flash-attn==2.6.3
      - einops==0.8.0
      - einops-exts==0.0.4
      # 数据与科学计算
      - pandas==2.2.3
      - scipy==1.15.3
      - scikit-learn==1.5.2
      - matplotlib==3.10.3
      - tqdm==4.67.1
      - openpyxl
      - xlsxwriter
      # 环境与接口
      - gradio==3.35.2
      - fastapi==0.116.1
      - uvicorn==0.35.0
      - httpx==0.27.2
      - pydantic==2.9.2
      # 工具类
      - nvitop==1.5.1
      - huggingface-hub==0.26.2
      - python-dotenv
      - ninja
      - shortuuid